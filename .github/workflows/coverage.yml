name: Test Coverage

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  statuses: write # Needed for updating the commit status

jobs:
  report:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Initialize pending status check
      uses: myrotvorets/set-commit-status-action@v2.0.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        sha: ${{ github.event.workflow_run.head_sha }}
        status: pending
        targetUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}
        context: Test Coverage
        description: Running coverage analysis...
    - uses: actions/checkout@v7
    - name: Setting up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Installing dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.dev.txt
    - name: Download Coverage Data
      uses: actions/download-artifact@v8
      with:
        name: coverage-data
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Report Coverage
      run: |
        python -m coverage report
    - name: Finalize status check
      uses: myrotvorets/set-commit-status-action@v2.0.1
      # Execute even if previous steps failed
      if: always()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        sha: ${{ github.event.workflow_run.head_sha }}
        status: ${{ job.status }}
        targetUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}
        context: Test Coverage
        description: Coverage report generation finished.

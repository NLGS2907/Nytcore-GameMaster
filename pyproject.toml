[tool.ruff.lint.extend-per-file-ignores]
# Ignore star imports in "__init__.py" files
"__init__.py" = ["F403"]

[tool.coverage.run]
source = ["gamemaster"]

[tool.coverage.report]
omit = [
    "tests/*",
    "*__init__.py",
    "*__main__.py",
    "*main.py",
    "*run_migrations.py",
    "*/migrations/*",
    "*/cogs/*",
    "*/managers/*",
    "*/ui/*",
    "*/modals/*",
    "*base*",
    "*interface.py",
    "*/logger/custom/*"
]
show_missing = true
fail_under = 80